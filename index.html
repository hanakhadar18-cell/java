<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dukaanka Casriga Ah</title>
    <style>
        /* Isbaddalka Guud ee Bogga */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }

        /* Qaybta Sare (Header) */
        header {
            background-color: #111;
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        /* Weelka Alaabta Guri u ah */
        .shop-container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Kaararka Alaabta (Product Cards) */
        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            padding: 20px;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* Meesha Sawirka Alaabta (Hadda waa calaamad astaan ah) */
        .product-image {
            background-color: #eaeaea;
            height: 180px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 15px;
        }

        .product-title {
            font-size: 20px;
            margin: 10px 0;
            font-weight: 600;
        }

        .product-price {
            color: #e44d26;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Badanka WhatsApp-ka */
        .order-btn {
            background-color: #25D366;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            transition: background 0.3s;
        }

        .order-btn:hover {
            background-color: #1ebd58;
        }
    </style>
</head>
<body>

    <!-- Qaybta Sare -->
    <header>
        <h1>🛍️ DUKAANKAYGA ONLINE-KA AH</h1>
        <p>Halkan ka hel alaabooyinka ugu jaban uguna tayada sarreeya</p>
    </header>

    <!-- Qaybta Alaabta -->
    <main class="shop-container">
        
        <!-- Alaabta 1-aad -->
        <div class="product-card">
            <div class="product-image">📱</div>
            <div class="product-title">Iphone 15 Pro</div>
            <div class="product-price">$999</div>
            <a href="https://wa.me" target="_blank" class="order-btn">Ku Dalbo WhatsApp</a>
        </div>

        <!-- Alaabta 2-aad -->
        <div class="product-card">
            <div class="product-image">💻</div>
            <div class="product-title">MacBook Air M2</div>
            <div class="product-price">$1,199</div>
            <a href="https://wa.me" target="_blank" class="order-btn">Ku Dalbo WhatsApp</a>
        </div>

    </main>

</body>
</html>
